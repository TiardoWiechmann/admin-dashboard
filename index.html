<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="searchbar">
                <label class="search" for="search">
                    <img src="icons/magnify.svg" alt="search icon" width="30px" height="30px">
                </label>
                <input type="search" id="search" name="q">
            </div>
            <div class="personal">
                <img src="icons/bell-ring-outline.svg" alt="bell ring icon" width="30px" height="30px">
                <img src="icons/emoticon-cool-outline.svg" alt="emoji with sunglasses" width="30px" height="30px">
                <div>Tiardo Wiechmann</div>
            </div>
            <div class="greeting">
                <img src="icons/emoticon-cool-outline.svg" alt="emoji with sunglasses" width="50" height="50">
                <div class="greeting-text">
                    <p>Hi there,</p>
                    <p>Tiardo Wiechmann</p>
                </div>
            </div>
            <div class="buttons">
                <button>New</button>
                <button>Upload</button>
                <button>Share</button>
            </div>
        </div>
        <nav class="sidebar">
        </nav>
        <div class="main">
        </div>
    </div>

    
</body>
</html>
